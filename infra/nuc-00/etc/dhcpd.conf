# DHCP Server Configuration for iPXE Boot Environment
# Domain: carbide-enclave.kubernerdes.com
# Network: 10.0.0.0/22

# Define option 93 - Client System Architecture Type
option space pxelinux;
option pxelinux.magic code 208 = string;
option pxelinux.configfile code 209 = text;
option pxelinux.pathprefix code 210 = text;
option pxelinux.reboottime code 211 = unsigned integer 32;
option architecture-type code 93 = unsigned integer 16;

# Global Options
option domain-name "carbide-enclave.kubernerdes.com";
option domain-name-servers 10.0.0.10, 8.8.8.8;
option ntp-servers 10.0.0.10, 10.0.0.101, 10.0.0.102, 10.0.0.103;
default-lease-time 7200;
max-lease-time 7200;
authoritative;

# Subnet Declaration
subnet 10.0.0.0 netmask 255.255.252.0 {
    option routers 10.0.0.1;
    option subnet-mask 255.255.252.0;
    
    # Dynamic IP Pool
    pool {
        range 10.0.0.172 10.0.0.254;
    }
    
    # Next-server for boot
    next-server 10.0.0.10;
    
    # UEFI-only boot with iPXE
    if exists user-class and option user-class = "iPXE" {
        # Client already has iPXE, send them to their specific menu
        # This will be overridden by host-specific configurations
        filename "http://10.0.0.10/ipxe-menu";
    } else {
        # Send iPXE EFI binary for UEFI boot
        filename "ipxe.efi";
    }
}

# Host: nuc-01 (gen10 NUC)
host nuc-01 {
    hardware ethernet 88:ae:dd:0b:90:70;
    fixed-address 10.0.0.101;
    option host-name "nuc-01";
    option domain-name "carbide-enclave.kubernerdes.com";

    if exists user-class and option user-class = "iPXE" {
        # Second, process this file
        filename "http://10.0.0.10/harvester/harvester/ipxe-menu";
    } else {
        # First boot using tftp, which is followed by line above
        filename "ipxe.efi";
    }
}
# Host: nuc-02 (gen10 NUC)
host nuc-02 {
    hardware ethernet 1c:69:7a:ab:23:50;
    fixed-address 10.0.0.102;
    option host-name "nuc-02";
    option domain-name "carbide-enclave.kubernerdes.com";

    if exists user-class and option user-class = "iPXE" {
        # Second, process this file
        filename "http://10.0.0.10/harvester/harvester/ipxe-menu";
    } else {
        # First boot using tftp, which is followed by line above
        filename "ipxe.efi";
    }
}
# Host: nuc-03 (gen10 NUC)
host nuc-03 {
    hardware ethernet 88:ae:dd:0b:af:9c;
    fixed-address 10.0.0.103;
    option host-name "nuc-03";
    option domain-name "carbide-enclave.kubernerdes.com";

    if exists user-class and option user-class = "iPXE" {
        # Second, process this file
        filename "http://10.0.0.10/harvester/harvester/ipxe-menu";
    } else {
        # First boot using tftp, which is followed by line above
        filename "ipxe.efi";
    }
}

include "/etc/dhcpd.d/dhcpd-hosts.conf";
