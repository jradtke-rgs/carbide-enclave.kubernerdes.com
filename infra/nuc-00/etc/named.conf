// BIND configuration — nuc-00 (bastion)
// Authoritative for carbide-enclave.kubernerdes.com
// Recursive for enclave clients; forwards to upstream during pre-airgap bootstrap.
//
// Airgap note: remove the forwarders block once internet access is severed.
// Internal clients will resolve only names defined in local zone files.

options {
    directory           "/var/lib/named";
    dump-file           "/var/log/named/named_dump.db";
    statistics-file     "/var/log/named/named.stats";

    listen-on           { 127.0.0.1; 10.0.0.10; };
    listen-on-v6        { none; };

    allow-query         { any; };
    allow-recursion     { 127.0.0.1; 10.0.0.0/22; };
    allow-transfer      { none; };

    // Forward unknown queries upstream during bootstrap.
    // Remove once airgap boundary is in place.
    forwarders          { 8.8.8.8; 8.8.4.4; };
    forward             first;

    dnssec-validation   auto;
};

logging {
    channel enclave_log {
        file "/var/log/named/named.log" versions 3 size 10m;
        severity notice;
        print-time      yes;
        print-severity  yes;
        print-category  yes;
    };
    category default    { enclave_log; };
};

// Root hints — on OpenSUSE Leap 15.6 the bind package ships this as root.hint
zone "." IN {
    type hint;
    file "root.hint";
};

// Localhost zones — on OpenSUSE Leap 15.6 these live at the top of /var/lib/named/
zone "localhost" IN {
    type master;
    file "localhost.zone";
    notify no;
};

zone "0.0.127.in-addr.arpa" IN {
    type master;
    file "127.0.0.zone";
    notify no;
};

// Enclave zones
include "/etc/named.d/carbide-enclave.conf";
