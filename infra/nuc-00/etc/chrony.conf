# chrony configuration — nuc-00 (bastion)
# Syncs from pool.ntp.org; serves NTP to 10.0.0.0/22 enclave.
#
# Airgap note: once internet access is removed, comment out the pool line.
# The "local stratum 10" directive keeps nuc-00 serving time to clients
# from its local clock even when no upstream is reachable.

pool pool.ntp.org iburst

# Serve NTP to the entire enclave subnet
allow 10.0.0.0/22

# Announce as a stratum-10 server regardless of sync state.
# Ensures clients get a time source during airgap operation.
local stratum 10

# Allow a one-time step on first three updates (handles large initial skew)
makestep 1.0 3

# Sync hardware clock periodically
rtcsync

driftfile /var/lib/chrony/drift
leapsectz right/UTC
